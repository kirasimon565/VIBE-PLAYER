name: vibe_player
description: "Revolutionary Audio/Video Player for Android"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  audioplayers: ^6.0.0
  video_player: ^2.8.6
  camera: ^0.11.0
  on_audio_query: ^3.1.13
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  palette_generator: ^0.3.3+3
  google_fonts: ^6.2.1
  uuid: ^4.4.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/fonts/
    - assets/icons/
    - assets/sounds/
